<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="navbar" style="display:none; background: var(--card-bg); padding: 1rem; border-bottom: var(--border-style); display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000;">
        <div style="font-weight: 800; font-size: 1.2rem;">PORTAL R&M</div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button onclick="showSection('character-module')" style="width: auto;">Personajes</button>
            <button onclick="showSection('episodes-module')" style="width: auto;">Episodios</button>
            <button onclick="logout()" style="width: auto; background: #ff7675;">Salir</button>
            
            <label class="switch">
                <input type="checkbox" id="theme-toggle" onchange="toggleDarkMode()">
                <span class="slider"></span>
            </label>
        </div>
    </nav>
   
    
    <div id="auth-container">
        <form id="login-form">
            <h2>Inicio de Sesión</h2>
            <input type="email" placeholder="Correo" required>
            <input type="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
            <p onclick="showForm('register-form')">¿No tienes cuenta? Regístrate</p>
            <p onclick="showForm('recovery-form')">¿Olvidaste tu contraseña?</p>
        </form>

        <form id="register-form" style="display:none;">
            <h2>Registro</h2>
            <input type="text" placeholder="Nombre completo" required>
            <input type="email" placeholder="Correo" required>
            <input type="password" placeholder="Contraseña" required>
            <button type="submit">Registrarse</button>
            <p onclick="showForm('login-form')">Volver al Login</p>
        </form>

        <form id="recovery-form" style="display:none;">
            <h2>Recuperar Contraseña</h2>
            <input type="email" placeholder="Ingresa tu correo" required>
            <button type="submit">Enviar instrucciones</button>
            <p onclick="showForm('login-form')">Volver al Login</p>
        </form>
    </div>

    <section id="character-module" style="display: none;">
        <h2>Gestión de Personajes</h2>
        <input type="text" id="search-input" placeholder="Buscar por nombre..." oninput="filterCharacters()">
        <div class="table-container">
            <table id="character-table">
                <thead>
                    <tr><th onclick="sortTable(0, 'character-table')">ID</th><th onclick="sortTable(1, 'character-table')">Nombre</th><th onclick="sortTable(2, 'character-table')">Especie</th><th onclick="sortTable(3, 'character-table')">Género</th></tr>
                </thead>
                <tbody id="character-body"></tbody>
            </table>
        </div>
    </section>
    <div id="character-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:var(--card-bg); padding:2rem; border-radius:20px; border:var(--border-style); width:90%; max-width:550px; max-height:90vh; overflow-y:auto; position:relative; box-shadow: 8px 8px 0px #000;">
            <h2 style="margin-top:0; text-align: left;">Ficha del Personaje</h2>
            
            <!-- Contenedor específico para la estructura del personaje -->
            <div id="modal-body-characters"></div>
            
            <div style="display:flex; gap:10px; margin-top:20px; width: 100%;">
                <button onclick="saveChanges()" style="margin-top:0;">Guardar Cambios</button>
                <button onclick="document.getElementById('character-modal').style.display='none'" style="background:#ff7675; margin-top:0;">Cerrar</button>
            </div>
        </div>
    </div>
    <section id="episodes-module" style="display: none;">
        <h2>Gestión de Episodios</h2>
        <input type="text" id="search-input" placeholder="Buscar por nombre..." oninput="filterEpisodes()">
        <div class="table-container">
            <table id="episodes-table">
                <thead>
                    <tr><th onclick="sortTable(0, 'episodes-table')">ID</th><th onclick="sortTable(1, 'episodes-table')">Nombre</th><th onclick="sortTable(2, 'episodes-table')">Fecha de Estreno</th><th onclick="sortTable(3, 'episodes-table')">Episodio</th></tr>
                </thead>
                <tbody id="episodes-body"></tbody>
            </table>
        </div>
    </section>
    <div id="episodes-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:var(--card-bg); padding:2rem; border-radius:20px; border:var(--border-style); width:90%; max-width:550px; max-height:90vh; overflow-y:auto; position:relative; box-shadow: 8px 8px 0px #000;">
            <h2 id="modal-name" style="margin-top:0;">Detalle de Episodio</h2>
            
            <!-- Aquí se inyectará el contenido ordenado -->
            <div id="modal-body-episodes"></div>
            
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="saveChanges()" style="margin-top:0;">Guardar Cambios</button>
                <button onclick="document.getElementById('episodes-modal').style.display='none'" style="background:#ff7675; margin-top:0;">Cerrar</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
